<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Checkout</title>
    <style>
        .form-control { border-radius: 4px; border: 1px solid #ced4da; padding: 0.75rem; }
    </style>
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-10">
                <div class="row">
                    <div class="col-md-7">
                        <div class="card shadow-sm border-0 p-4">
                            <h3 class="mb-4">Shipping Details</h3>
                            {% if form.errors %}
                                <div class="alert alert-danger">{{ form.errors }}</div>
                            {% endif %}
                            
                            <form action="." method="POST">
                                {% csrf_token %}
                                {% for field in form %}
                                    <div class="mb-3">
                                        <label class="form-label fw-bold small text-uppercase">{{ field.label }}</label>
                                        {{ field }}
                                    </div>
                                {% endfor %}
                                <button type="submit" class="btn btn-primary btn-lg w-100 mt-4">Place Order</button>
                            </form>
                        </div>
                    </div>
                    
                    <div class="col-md-5">
                        <div class="card bg-dark text-white p-4 border-0">
                            <h5>Order Summary</h5>
                            <hr class="bg-secondary">
                            {% for item in cart %}
                                <div class="d-flex justify-content-between mb-2">
                                    <small>{{ item.quantity }}x {{ item.product.name }}</small>
                                    <small>${{ item.total_item_price }}</small>
                                </div>
                            {% endfor %}
                            <hr class="bg-secondary">
                            <div class="d-flex justify-content-between fw-bold fs-5">
                                <span>Grand Total</span>
                                <span>${{ cart.get_total_price }}</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
