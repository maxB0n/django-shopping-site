<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Order Confirmed</title>
</head>
<body class="bg-light d-flex align-items-center vh-100">
    <div class="container text-center">
        <div class="card shadow-lg border-0 p-5 mx-auto" style="max-width: 600px;">
            <div class="mb-4">
                <div class="display-1 text-success">✔</div>
            </div>
            <h1 class="fw-bold">Order Confirmed</h1>
            <p class="text-muted lead mb-4">Your order #<strong>{{ order.id }}</strong> has been successfully registered. Thank you for your support!</p>
            
            <div class="alert alert-light border text-start mb-4">
                <div class="small text-muted text-uppercase fw-bold">Ship to:</div>
                <div class="fw-bold">{{ order.full_name }}</div>
                <div>{{ order.shipping_address }}</div>
            </div>

            <a href="/" class="btn btn-outline-dark px-5">Continue Shopping</a>
        </div>
    </div>
</body>
</html>
