<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Site</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">SHOPPING SITE</a>
            <div class="ms-auto">
                <a href="{% url 'cart_summary' %}" class="btn btn-outline-light position-relative">
                    🛒 Cart
                    {% if cart %}<span class="badge bg-danger rounded-pill">{{ cart|length }}</span>{% endif %}
                </a>
            </div>
        </div>
    </nav>

    <div class="container">
        <h2 class="mb-4 fw-light">Available Items</h2>
        <div class="row row-cols-1 row-cols-md-3 g-4">
            {% for product in products %}
            <div class="col">
                <div class="card h-100 shadow-sm border-0">
                    {% if product.image %}
                        <img src="{{ product.image.url }}" class="card-img-top p-3" alt="{{ product.name }}" style="height: 200px; object-fit: contain;">
                    {% endif %}
                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title fw-bold">{{ product.name }}</h5>
                        <p class="card-text text-muted small">{{ product.description }}</p>
                        <div class="mt-auto">
                            <h4 class="text-primary mb-3">${{ product.price }}</h4>
                            <form action="{% url 'cart_add' %}" method="POST" class="row g-2">
                                {% csrf_token %}
                                <input type="hidden" name="product_id" value="{{ product.id }}">
                                <div class="col-4">
                                    <input type="number" name="quantity" value="1" min="1" class="form-control">
                                </div>
                                <div class="col-8">
                                    <button type="submit" class="btn btn-dark w-100">Add to Cart</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
